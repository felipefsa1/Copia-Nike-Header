<!DOCTYPE html>
<html lang="pt-br">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cópia da Nike</title>
    <link rel="stylesheet" href="./css/style.css">
 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
 
<body>
 
    <div class="junto">
 
        <div class="mini_logo">
            <img src="./img/jordan.svg" alt="Logo do jordan">
            <img src="./img/snkrs.svg" alt="Logo da snkrs">
        </div>
 
        <div class="topo">
            <div>Acessibilidade</div>
            <span>|</span>
            <div>Guia de produtos</div>
            <span>|</span>
            <div>Acompanhe seu pedido</div>
            <div>Ajuda</div>
            <div>Junte-se a nós</div>
            <div>Entrar</div>
        </div>
 
    </div>
 
    <div class="header">
 
        <div class="logo"><img src="./img/logo.svg" alt="Logo da Nike"></div>
 
        <div class="menu">
            <div>Seleções</div>
            <div>Ofertas</div>
            <div>Lançamentos</div>
            <div>Masculino</div>
            <div>Feminino</div>
            <div>Infantil</div>
            <div>SNKRS</div>
        </div>
 
        <div class="icons">
            <div><i class="fa-solid fa-magnifying-glass"></i></div>
            <div><i class="fa-regular fa-heart"></i></div>
            <div><i class="fa-solid fa-bag-shopping"></i></div>
        </div>
 
    </div>
 
    <div class="barra">
        <span>TÊNIS DE CORRIDA</span>
        <div>Encontre o seu tênis ideal. Saiba mais</div>
    </div>
 
</body>
 
</html>
